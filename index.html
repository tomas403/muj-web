<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Můj první web</title>
   <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Ahoj světe! 👋</h1>
  <p>testík testík.</p>
  <button onclick="zmenBarvu()">Změň barvu!</button>
  <script>
  function zmenBarvu() {
    const barvy = ['#1a1a2e', '#2d1b69', '#1a2e1a', '#2e1a1a', '#1a2a2e'];
    const nahodna = barvy[Math.floor(Math.random() * barvy.length)];
    document.body.style.backgroundColor = nahodna;
  }
</script>
</body>
<p>Počet kliků: <span id="pocet">0</span></p>
<button onclick="klikni()">Klikni na mě!</button>
<script>
  let pocet = 0;

  function zmenBarvu() {
    const barvy = ['#1a1a2e', '#2d1b69', '#1a2e1a', '#2e1a1a', '#1a2a2e'];
    const nahodna = barvy[Math.floor(Math.random() * barvy.length)];
    document.body.style.backgroundColor = nahodna;
  }

  function klikni() {
    pocet = pocet + 1;
    document.getElementById('pocet').textContent = pocet;
  }
</script>
</html>
